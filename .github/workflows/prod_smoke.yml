name: Production Smoke Gate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke:
    name: Run production smoke checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate required secrets
        env:
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
        run: |
          if [ -z "$SMOKE_TEST_EMAIL" ] || [ -z "$SMOKE_TEST_PASSWORD" ]; then
            echo "Missing required secrets: SMOKE_TEST_EMAIL and/or SMOKE_TEST_PASSWORD"
            exit 1
          fi

      - name: Run production smoke suite
        env:
          SMOKE_BASE_URL: ${{ vars.SMOKE_BASE_URL || 'https://mls-backend-v2.vercel.app' }}
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
          SMOKE_TIMEOUT_SECONDS: "25"
        run: python backend/prod_smoke.py
