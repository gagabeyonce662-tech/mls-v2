name: Daily MLS Data Sync

on:
  schedule:
    # GitHub may delay scheduled workflows during heavy load, but this requests
    # a five-minute sync cadence.
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

concurrency:
  group: daily-mls-data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sync Command
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
        run: |
          cd backend
          python manage.py migrate --noinput
          python manage.py sync_ddf_properties --threads 12
